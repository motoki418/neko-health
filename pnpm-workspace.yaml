trustPolicyExclude:
  - 'eslint-import-resolver-typescript@3.10.1'
  - 'undici-types@6.21.0'
  # Required by eslint-config-next@16.2.6 via eslint-plugin-react@7.37.5.
  # Remove once the dependency chain no longer resolves semver@6.3.1 without provenance.
  - 'semver@6.3.1'

overrides:
  postcss: 8.5.14

allowBuilds:
  # OpenNext/wrangler のビルドに必要（tomozane-matching-mvp と同じ許可セット）
  esbuild: true
  sharp: true
  unrs-resolver: true
  workerd: true
